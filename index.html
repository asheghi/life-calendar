<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Life Calendar</title>
    <link rel="stylesheet" href="./style.css" />
    <script>
      (function () {
        var saved = localStorage.getItem('theme');
        var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>

    <!-- Fixed overlays — must be OUTSIDE the scaled wrapper -->

    <!-- Onboarding -->
    <div id="onboarding" class="onboarding">
      <div id="ob-step1" class="ob-step ob-step--active">
        <h1 class="ob-heading">When were you born?</h1>
        <input id="ob-birthdate" type="date" class="ob-date-input" />
        <button id="ob-next" class="ob-btn">Next →</button>
      </div>
      <div id="ob-step2" class="ob-step ob-step--hidden">
        <h1 class="ob-heading">How long do you plan to live?</h1>
        <div class="ob-life-row">
          <input id="ob-life-input" type="number" min="50" max="110" value="80" class="ob-life-num" />
          <span class="ob-life-unit">years</span>
        </div>
        <input id="ob-life-slider" type="range" min="50" max="110" value="80" class="ob-slider" />
        <button id="ob-start" class="ob-btn">Start</button>
      </div>
      <div class="ob-dots">
        <span id="ob-dot1" class="ob-dot ob-dot--active"></span>
        <span id="ob-dot2" class="ob-dot"></span>
      </div>
    </div>

    <!-- Settings overlay -->
    <div id="settings-overlay" class="settings-overlay hidden"></div>

    <!-- Settings panel -->
    <aside id="settings-panel" class="settings-panel">
      <button id="sp-close" class="sp-close" aria-label="Close settings">×</button>
      <h2 class="sp-heading">Settings</h2>
      <label class="sp-label">
        Theme
        <div class="sp-swatches">
          <button class="swatch" data-theme-value="light"  title="Light"></button>
          <button class="swatch" data-theme-value="dark"   title="Dark"></button>
          <button class="swatch" data-theme-value="aurora" title="Aurora"></button>
          <button class="swatch" data-theme-value="sunset" title="Sunset"></button>
          <button class="swatch" data-theme-value="ocean"  title="Ocean"></button>
        </div>
      </label>
      <label class="sp-label">
        Birthdate
        <input id="sp-birthdate" type="date" class="sp-input" />
      </label>
      <label class="sp-label">
        Life expectancy
        <div class="sp-life-row">
          <input id="sp-life-input" type="number" min="50" max="110" value="80" class="sp-life-num" />
          <span class="sp-life-unit">years</span>
        </div>
        <input id="sp-life-slider" type="range" min="50" max="110" value="80" class="sp-slider" />
      </label>
      <a id="sp-reset" href="#" class="sp-reset">Reset &amp; start over</a>
    </aside>

    <!-- Scale wrapper — transform lives here, not on body -->
    <div class="scale-wrapper">
      <div class="container">
        <div class="header-row">
          <div class="header">weeks of my life</div>
          <div class="header-actions">
            <button id="theme-btn" class="icon-btn" aria-label="Cycle theme">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="13.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
                <circle cx="17.5" cy="10.5" r="1" fill="currentColor" stroke="none"/>
                <circle cx="8.5"  cy="7.5"  r="1" fill="currentColor" stroke="none"/>
                <circle cx="6.5"  cy="12.5" r="1" fill="currentColor" stroke="none"/>
                <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>
              </svg>
            </button>
            <button id="gear-btn" class="icon-btn" aria-label="Open settings">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="stats" class="stats"></div>
        <div class="plot"></div>
        <div class="footer">
          <h4>you only live once</h4>
        </div>
      </div>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
